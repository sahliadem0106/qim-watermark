# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — QIM Watermarking
# GitHub → Docker Hub → Azure App Service
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

# ── TRIGGER : runs on every push to main ──────────────────────────────────────
on:
  push:
    branches:
      - main

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 : TEST
# Installs dependencies and runs pytest to verify the code works
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest          # GitHub spins up a free Ubuntu VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # clones your repo into the VM

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          export MPLBACKEND=Agg
          python -m pytest tests/ -v

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 : BUILD
# Builds the Docker image and pushes it to Docker Hub
# Only runs if tests passed (needs: test)
# ══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                     # waits for the test job to succeed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/qim-watermark:${{ github.sha }} .
          docker tag  ${{ secrets.DOCKER_USERNAME }}/qim-watermark:${{ github.sha }} \
                      ${{ secrets.DOCKER_USERNAME }}/qim-watermark:latest

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/qim-watermark:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/qim-watermark:latest

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 : DEPLOY
# Connects to Azure and tells App Service to use the new Docker image
# Only runs if build passed (needs: build)
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build                    # waits for the build job to succeed

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'qim-watermark-app'          # ← CHANGE THIS to your Azure App Service name
          images: '${{ secrets.DOCKER_USERNAME }}/qim-watermark:latest'
